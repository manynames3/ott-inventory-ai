<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="860" viewBox="0 0 1320 860" role="img" aria-labelledby="title desc">
  <title id="title">Inventory AI 오뚜기 운영 미리보기</title>
  <desc id="desc">오뚜기형 재고 가져오기 검증, 결품 위험, FEFO 로트 우선순위, 자연어 질의 결과를 보여주는 밝은 제품 미리보기.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fffdeb"/>
    </linearGradient>
    <linearGradient id="yellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff300"/>
      <stop offset="1" stop-color="#ffed00"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e83c20"/>
      <stop offset="1" stop-color="#dc2f34"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.4" fill="#dc2f34" fill-opacity="0.12"/>
    </pattern>
  </defs>

  <rect width="1320" height="860" fill="transparent"/>
