    <text x="152" y="326" fill="#a6a09a" font-family="Geist, Arial, sans-serif" font-size="18">products.csv</text>
    <text x="402" y="326" fill="#3ecf8e" font-family="Geist Mono, Consolas, monospace" font-size="17">110 rows</text>
    <text x="152" y="358" fill="#a6a09a" font-family="Geist, Arial, sans-serif" font-size="18">inventory_lots.csv</text>
    <text x="402" y="358" fill="#3ecf8e" font-family="Geist Mono, Consolas, monospace" font-size="17">555 rows</text>
