    <text x="558" y="286" fill="#000000" font-family="Apple SD Gothic Neo, Noto Sans KR, Malgun Gothic, Arial, sans-serif" font-size="22" font-weight="900">폐기 절감 기회</text>
    <text x="558" y="346" fill="#dc2f34" font-family="Apple SD Gothic Neo, Noto Sans KR, Malgun Gothic, Arial, sans-serif" font-size="58" font-weight="900">$428K</text>
    <text x="558" y="386" fill="#555555" font-family="Apple SD Gothic Neo, Noto Sans KR, Malgun Gothic, Arial, sans-serif" font-size="18">만료 임박 로트 감지</text>

