    <text x="470" y="172" fill="#000000" font-family="Apple SD Gothic Neo, Noto Sans KR, Malgun Gothic, Arial, sans-serif" font-size="20" font-weight="800">오뚜기 북미 운영 파일럿</text>
    <rect x="990" y="143" width="172" height="42" rx="21" fill="#fffdeb" stroke="#ffed00" stroke-width="2"/>
