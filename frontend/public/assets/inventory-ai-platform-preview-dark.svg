    <path d="M154 169 Q165 177 176 169" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <text x="158" y="168" fill="#ffffff" font-family="Apple SD Gothic Neo, Noto Sans KR, Malgun Gothic, Arial, sans-serif" font-size="10" font-weight="900">AI</text>
