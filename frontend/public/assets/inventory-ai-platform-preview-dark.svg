    <rect x="168" y="538" width="42" height="18" rx="9" fill="url(#red)"/>
    <text x="180" y="552" fill="#fff7ed" font-family="Geist Mono, Consolas, monospace" font-size="12" font-weight="700">P1</text>
    <text x="230" y="553" fill="#f0ede8" font-family="Geist, Arial, sans-serif" font-size="17">OTG-CUR-001 · LA DC · 13.5 days supply</text>
    <rect x="152" y="584" width="546" height="42" rx="12" fill="#0a0a0f" fill-opacity="0.46"/>
    <rect x="168" y="596" width="42" height="18" rx="9" fill="url(#red)"/>
    <text x="180" y="610" fill="#fff7ed" font-family="Geist Mono, Consolas, monospace" font-size="12" font-weight="700">P1</text>
    <text x="230" y="611" fill="#f0ede8" font-family="Geist, Arial, sans-serif" font-size="17">OTG-RAM-001 · ship older lot before fresh receipts</text>
