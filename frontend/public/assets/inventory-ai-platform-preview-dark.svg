<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="860" viewBox="0 0 1320 860" role="img" aria-labelledby="title desc">
  <title id="title">Inventory AI 오뚜기 운영 미리보기</title>
  <desc id="desc">오뚜기형 가져오기 검증, 품절 위험, FEFO 로트 우선순위, 자연어 질의 결과를 보여주는 제품 미리보기.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1c26"/>
      <stop offset="1" stop-color="#101016"/>
