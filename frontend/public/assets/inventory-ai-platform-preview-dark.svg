    <text x="832" y="596" fill="#d4a843" font-family="Geist, Arial, sans-serif" font-size="17" font-weight="700">Answer</text>
    <text x="832" y="624" fill="#b9b2aa" font-family="Geist, Arial, sans-serif" font-size="17">25 SKU/warehouse actions due now.</text>
