    <text x="806" y="494" fill="#dc2f34" font-family="Apple SD Gothic Neo, Noto Sans KR, Malgun Gothic, Arial, sans-serif" font-size="17" font-weight="900">질문</text>
    <text x="806" y="532" fill="#000000" font-family="Apple SD Gothic Neo, Noto Sans KR, Malgun Gothic, Arial, sans-serif" font-size="20" font-weight="800">이번 주 무엇을 발주해야 하나요?</text>
    <rect x="806" y="562" width="318" height="78" rx="20" fill="#fffdeb" stroke="#ffed00" stroke-width="2"/>
    <text x="832" y="596" fill="#dc2f34" font-family="Apple SD Gothic Neo, Noto Sans KR, Malgun Gothic, Arial, sans-serif" font-size="17" font-weight="900">답변</text>
    <text x="832" y="624" fill="#000000" font-family="Apple SD Gothic Neo, Noto Sans KR, Malgun Gothic, Arial, sans-serif" font-size="17">지금 조치할 SKU/창고 25개</text>
